<!DOCTYPE html>
<html lang="ku">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تایبەتمەندی کەسایەتی خۆت ✨</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Performance optimizations for 144fps smooth experience -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#facc15">
    <!-- Preload critical resources -->
    <link rel="preload" href="logo.png" as="image">
    <link rel="preload" href="bg.png" as="image">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        /* K24 Font */
        @font-face {
            font-family: 'K24';
            src: url('K24.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Personality page specific styles */
        .personality-container {
            max-width: 800px;
            margin: 2rem auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) translateZ(0); }
            to { opacity: 1; transform: translateY(0) translateZ(0); }
        }

        @keyframes pulse {
            0% { 
                transform: translateY(-2px) translateZ(0) scale(1);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            }
            50% { 
                transform: translateY(-2px) translateZ(0) scale(1.02);
                box-shadow: 0 8px 30px rgba(255, 0, 0, 0.3);
            }
            100% { 
                transform: translateY(-2px) translateZ(0) scale(1);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            }
        }

        .title-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .personality-title {
            text-align: center;
            color: #000000;
            font-size: 2.5rem;
            margin: 0;
            font-family: 'K24', 'Vazirmatn', sans-serif;
            direction: rtl;
        }

        .language-btn {
            font-size: 0.9rem;
            padding: 8px 16px;
            height: auto;
            white-space: nowrap;
        }

        .question {
            margin-bottom: 20px;
            padding: 20px;
            background: #e4f0f2;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, box-shadow;
            text-align: right;
            direction: rtl;
        }

        .question:hover {
            transform: translateY(-2px) translateZ(0);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .question p {
            margin-bottom: 15px;
            font-weight: 500;
            color: #000000;
            font-family: 'K24', 'Vazirmatn', sans-serif;
            font-size: 1.5rem;
            line-height: 1.6;
        }

        .answers label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 6px;
            background: #F2F7F8;
            transition: background 0.15s cubic-bezier(0.4, 0, 0.2, 1), transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: background, transform;
            font-family: 'K24', 'Vazirmatn', sans-serif;
            font-size: 1.3rem;
            text-align: right;
            direction: rtl;
        }

        .answers input[type="radio"] {
            margin-left: 10px;
            margin-right: 0;
            transform: scale(1.2);
        }

        .answers label:hover {
            background: #ffffff;
            transform: translateX(-5px) translateZ(0);
        }

        .personality-buttons {
            text-align: center;
            margin-top: 2rem;
        }

        .personality-btn {
            display: inline-block;
            margin: 0 10px;
            padding: 12px 25px;
            font-size: 1.1rem;
            background: #e4f0f2;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, background;
            font-family: 'K24', 'Vazirmatn', sans-serif;
        }

        .personality-btn:hover {
            background: #ffd9b9;
            transform: translateY(-2px) translateZ(0);
            box-shadow: 0 4px 12px rgba(217, 162, 153, 0.3);
        }

        .personality-btn:active {
            transform: translateY(0) translateZ(0);
        }

        .result {
            text-align: center;
            font-size: 1.8rem;
            color: #000000;
            margin-top: 2rem;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
            font-family: 'K24', 'Vazirmatn', sans-serif;
            direction: rtl;
        }

        .result a {
            display: block;
            margin-top: 10px;
            color: #007BFF;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: color;
        }

        .result a:hover {
            color: #0056b3;
        }

        /* K24 font for personality navigation link */
        .nav-links li a[href="personality.html"] {
            font-family: 'K24', 'Vazirmatn', sans-serif;
        }

        /* Mobile responsive adjustments */
        @media (max-width: 600px) {
            .personality-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .title-section {
                flex-direction: column;
                gap: 15px;
            }
            
            .personality-title {
                font-size: 2rem;
            }
            
            .language-btn {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
            
            .personality-btn {
                display: block;
                margin: 10px auto;
                width: 200px;
            }
        }
    </style>
</head>

    <script>
        // Performance optimization: Cache DOM elements
        const quizForm = document.getElementById("quizForm");

        // Language data
        const languageData = {
            ku: {

                    INFJ: "خاوەن بینایی تێگەیشتوون، بە قووڵی تەرکیز دەکەنە سەر یارمەتیدانی کەسانی تر بۆ بەدیهێنانی تواناکانیان",
                    INTJ: "بیرمەندی ستراتیجی و بەهرەیان هەیە لە پلاندانانی درێژخایەن و داهێنان.",
                    ISTP: "سەرکێشی چارەسەرکەری کێشەکانن، کە چێژ لە تێگەیشتن لە چۆنیەتی کارکردنی شتەکان وەردەگرن و یەکلاکەرەوە هەڵسوکەوت دەکەن",
                    ISFP: "هونەرمەندی نەرمونیان، کە ئازادی تاکەکەسی و جوانی لە جیهانی دەوروبەریاندا بایەخ دەدەن",

                    INTP: "بیرمەندێکی زانکۆن، بەردەوام بەدوای تێگەیشتن و شیکردنەوەی چەمکە ئاڵۆزەکاندا دەگەڕێن.",
                    ESTP: "ئەنجامدەری چالاکن، کە حەز دەکەن لە ساتدا بژین و کاری بوێرانە ئەنجام بدەن",

                },
                resultText: "کەسایەتی تۆ:",
                backToHome: "بگەڕەوە بۆ پەڕەی سەرەکی",
                notFound: "کەسایەتی تۆ بەردەست نییە لە سیستەمەکەدا."
            },
            en: {
                title: "Discover Your Personality Type ✨",
                submit: "Submit",
                reset: "Reset 🔄",
                languageBtn: "کوردی",
                questions: [
                    { text: "After spending time with many people, I feel energized", dimension: "EI" },
                    { text: "In large gatherings, I prefer to stay on the sidelines.", dimension: "EI", reverse: true },
                    { text: "After group discussions, I need alone time to recharge", dimension: "EI", reverse: true },
                    { text: "I often speak without thinking first", dimension: "EI" },
                    { text: "Being very social sometimes drains me", dimension: "EI", reverse: true },
                    { text: "I enjoy daydreaming and exploring big ideas and possibilities", dimension: "NS" },
                    { text: "When making decisions, I rely more on facts than theories", dimension: "NS", reverse: true },
                    { text: "I focus more on the present and what's real rather than imaginative ideas", dimension: "NS", reverse: true },
                    { text: "I enjoy imaginative things more", dimension: "NS" },
                    { text: "I pay more attention to small details than big things.", dimension: "NS", reverse: true },
                    { text: "I make decisions based on facts.", dimension: "TF", reverse: true },
                    { text: "I try to be helpful, not just happy.", dimension: "TF" },
                    { text: "Other people's feelings are always important in my decisions.", dimension: "TF", reverse: true },
                    { text: "I often show my feelings when solving problems.", dimension: "TF" },
                    { text: "I can't do something that feels wrong even if it makes sense logically.", dimension: "TF", reverse: true },
                    { text: "I enjoy planning and making lists", dimension: "JP" },
                    { text: "I go with the flow rather than planning", dimension: "JP", reverse: true },
                    { text: "I complete my tasks before the deadline.", dimension: "JP" },
                    { text: "I often procrastinate but finish before the deadline", dimension: "JP", reverse: true },
                    { text: "Planning ahead makes me feel more in control", dimension: "JP" }
                ],
                answerTextMap: {
                    "A": "Strongly Agree",
                    "B": "Agree", 
                    "C": "Neutral",
                    "D": "Disagree",
                    "E": "Strongly Disagree"
                },
                personalityDescriptions: {
                    ISTJ: "They are responsible organizers who support creating and enforcing order within systems and institutions",
                    ISFJ: "Protects those they care about",
                    INFJ: "Insightful visionaries, deeply focused on helping others reach their potential",
                    INTJ: "Strategic thinkers with talent for long-term planning and innovation.",
                    ISTP: "Adventurous problem-solvers who enjoy understanding how things work and act independently",
                    ISFP: "Gentle artists who value personal freedom and beauty in their surroundings",
                    INFP: "Idealistic dreamers passionate about values and meaningful relationships",
                    INTP: "Academic intellectuals constantly seeking understanding and analysis of complex concepts.",
                    ESTP: "Active achievers who like to live in the moment and do bold actions",
                    ESFP: "Entertainers who bring joy and energy wherever they go.",
                    ENFP: "Enthusiastic innovators passionate about possibilities and inspiring others.",
                    ENTP: "Smart debaters always ready to challenge ideas and explore possibilities.",
                    ESTJ: "Organized leaders committed to efficiency and preserving tradition",
                    ESFJ: "Caring supporters who emphasize harmony and community support",
                    ENFJ: "Charismatic facilitators talented at motivating and guiding others.",
                    ENTJ: "Natural commanders, visionary leaders who excel in strategic planning"
                },
                resultText: "Your Personality Type:",
                backToHome: "Back to Home",
                notFound: "Your personality type is not available in the system."
            }
        };

        let currentLanguage = 'ku'; // Default to Kurdish
        let questions = languageData[currentLanguage].questions;

        const options = ["A", "B", "C", "D", "E"];
        const values = { A: 2, B: 1, C: 0, D: -1, E: -2 };

        // Performance optimization: Cache answer text mapping
        let answerTextMap = languageData[currentLanguage].answerTextMap;

        function buildQuiz() {
            // Clear existing quiz content
            quizForm.innerHTML = '';
            
            // Performance optimization: Use DocumentFragment for better performance
            const fragment = document.createDocumentFragment();
            
            questions.forEach((q, i) => {
                const div = document.createElement("div");
                div.className = "question";
                div.innerHTML = `<p>${q.text}</p>`;
                const answerDiv = document.createElement("div");
                answerDiv.className = "answers";
                
                // Performance optimization: Build HTML string once
                const answerHTML = options.map(letter => {
                    const id = `q${i}_${letter}`;
                    return `<label>
                        <input type="radio" name="q${i}" value="${letter}" id="${id}">
                        ${letter} - ${answerTextMap[letter]}
                    </label>`;
                }).join('');
                
                answerDiv.innerHTML = answerHTML;
                div.appendChild(answerDiv);
                fragment.appendChild(div);
            });
            
            quizForm.appendChild(fragment);
        }

        let personalityDescriptions = languageData[currentLanguage].personalityDescriptions;

        function toggleLanguage() {
            currentLanguage = currentLanguage === 'ku' ? 'en' : 'ku';
            
            // Update all language-dependent variables
            questions = languageData[currentLanguage].questions;
            answerTextMap = languageData[currentLanguage].answerTextMap;
            personalityDescriptions = languageData[currentLanguage].personalityDescriptions;
            
            // Update button text
            document.getElementById('languageBtn').textContent = languageData[currentLanguage].languageBtn;
            
            // Update page title
            document.querySelector('.personality-title').textContent = languageData[currentLanguage].title;
            
            // Update button texts
            document.querySelector('.personality-btn[onclick="submitQuiz()"]').textContent = languageData[currentLanguage].submit;
            document.querySelector('.personality-btn[onclick="resetQuiz()"]').textContent = languageData[currentLanguage].reset;
            
            // Rebuild the quiz with new language
            buildQuiz();
            
            // Clear any existing results
            resultBox.innerHTML = '';
            resultBox.style.display = 'none';
        }

        function submitQuiz() {
            const totalQuestions = questions.length;
            let answeredQuestions = 0;
            const scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };

            // Performance optimization: Use more efficient iteration
            for (let i = 0; i < totalQuestions; i++) {
                const selectedAnswer = document.querySelector(`input[name="q${i}"]:checked`);
                if (selectedAnswer) {
                    answeredQuestions++;
                    const value = values[selectedAnswer.value];
                    const question = questions[i];
                    const actualValue = question.reverse ? -value : value;

                    switch (question.dimension) {
                        case "EI":
                            if (actualValue > 0) scores.E += Math.abs(actualValue);
                            else scores.I += Math.abs(actualValue);
                            break;
                        case "NS":
                            if (actualValue > 0) scores.N += Math.abs(actualValue);
                            else scores.S += Math.abs(actualValue);
                            break;
                        case "TF":
                            if (actualValue > 0) scores.T += Math.abs(actualValue);
                            else scores.F += Math.abs(actualValue);
                            break;
                        case "JP":
                            if (actualValue > 0) scores.J += Math.abs(actualValue);
                            else scores.P += Math.abs(actualValue);
                            break;
                    }
                }
            }

            if (answeredQuestions < totalQuestions) {
                // Find the first unanswered question and scroll to it immediately
                for (let i = 0; i < totalQuestions; i++) {
                    const selectedAnswer = document.querySelector(`input[name="q${i}"]:checked`);
                    if (!selectedAnswer) {
                        // Find the question element and scroll to it
                        const questionElement = document.querySelectorAll('.question')[i];
                        if (questionElement) {
                            questionElement.scrollIntoView({ 
                                behavior: 'smooth', 
                                block: 'center' 
                            });
                            // Add a visual highlight to the unanswered question
                            questionElement.style.animation = 'pulse 1s ease-in-out';
                            setTimeout(() => {
                                questionElement.style.animation = '';
                            }, 1000);
                        }
                        return;
                    }
                }
                return;
            }

            const personalityType = 
                (scores.E > scores.I ? "E" : "I") +
                (scores.N > scores.S ? "N" : "S") +
                (scores.T > scores.F ? "T" : "F") +
                (scores.J > scores.P ? "J" : "P");

            const description = personalityDescriptions[personalityType] || languageData[currentLanguage].notFound;

            // Performance optimization: Use requestAnimationFrame for smooth display
            requestAnimationFrame(() => {
                resultBox.innerHTML = `
                    <h2>${languageData[currentLanguage].resultText} ${personalityType}</h2>
                    <p>${description}</p>
                    <a href="index.html">${languageData[currentLanguage].backToHome}</a>
                `;
                resultBox.style.display = "block";
            });
        }

        function resetQuiz() {
            // Performance optimization: Use more efficient form reset
            const radioButtons = document.querySelectorAll('input[type="radio"]');
            radioButtons.forEach(radio => radio.checked = false);
            
            requestAnimationFrame(() => {
                resultBox.style.display = "none";
            });
        }



        // Performance optimization: Use DOMContentLoaded for better loading
        document.addEventListener('DOMContentLoaded', function() {
            buildQuiz();
            
            // Hamburger menu functionality - exact same as index page
            const hamburger = document.getElementById('hamburger');
            const navbar = document.querySelector('.navbar');
            
            hamburger.addEventListener('click', function() {
                navbar.classList.toggle('nav-open');
            });
        });
    </script>
</body>
</html>
